<svg width="1400" height="780" viewBox="0 0 1400 780" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCFCFA"/>
      <stop offset="1" stop-color="#F7FAFC"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 34px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
      .subtitle { font: 500 18px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .lane { font: 700 18px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
      .box-title { font: 700 20px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
      .copy { font: 500 16px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .small { font: 500 14px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .pill { font: 700 15px ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0F172A; }
    </style>
  </defs>

  <rect width="1400" height="780" fill="url(#bg)"/>

  <text x="40" y="66" class="title">Memory Bank Architecture</text>
  <text x="40" y="100" class="subtitle">A simplified view for users: capture conversations into memory, then recall them later through MCP.</text>

  <rect x="40" y="136" width="360" height="36" rx="18" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="60" y="159" class="pill" fill="#9A3412">Capture and recall are two separate paths</text>

  <rect x="420" y="136" width="360" height="36" rx="18" fill="#ECFDF5" stroke="#6EE7B7"/>
  <text x="440" y="159" class="pill" fill="#065F46">Any supported agent can share the same memories</text>

  <rect x="40" y="210" width="1320" height="240" rx="28" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="68" y="248" class="lane">1. Capture Path</text>
  <text x="68" y="274" class="small">This is how new conversations get saved into Memory Bank.</text>

  <rect x="70" y="310" width="240" height="100" rx="22" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="94" y="344" class="box-title" fill="#9A3412">Your Agent</text>
  <text x="94" y="372" class="copy">
    <tspan x="94" dy="0">Claude Code, Gemini CLI,</tspan>
    <tspan x="94" dy="24">or OpenCode</tspan>
  </text>

  <rect x="370" y="310" width="250" height="100" rx="22" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="394" y="344" class="box-title" fill="#9A3412">Hooks or Plugin</text>
  <text x="394" y="372" class="copy">
    <tspan x="394" dy="0">Capture prompts, tool use,</tspan>
    <tspan x="394" dy="24">and final replies</tspan>
  </text>

  <rect x="680" y="310" width="250" height="100" rx="22" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="704" y="344" class="box-title" fill="#9A3412">memory-bank-hook</text>
  <text x="704" y="372" class="copy">
    <tspan x="704" dy="0">Normalizes the event and</tspan>
    <tspan x="704" dy="24">sends it to the server</tspan>
  </text>

  <rect x="990" y="310" width="320" height="100" rx="22" fill="#FFF7ED" stroke="#FDBA74"/>
  <text x="1014" y="344" class="box-title" fill="#9A3412">Memory Bank Server</text>
  <text x="1014" y="372" class="copy">
    <tspan x="1014" dy="0">Groups conversation fragments</tspan>
    <tspan x="1014" dy="24">into memory notes and stores them</tspan>
  </text>

  <path d="M310 360 L370 360" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M620 360 L680 360" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M930 360 L990 360" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="1040" y="428" width="220" height="42" rx="16" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="1070" y="455" class="small">POST /ingest</text>

  <rect x="40" y="490" width="1320" height="230" rx="28" fill="#FFFFFF" stroke="#CBD5E1" filter="url(#shadow)"/>
  <text x="68" y="528" class="lane">2. Recall Path</text>
  <text x="68" y="554" class="small">This is how an agent pulls earlier context back into a new answer.</text>

  <rect x="70" y="590" width="240" height="100" rx="22" fill="#ECFDF5" stroke="#6EE7B7"/>
  <text x="94" y="624" class="box-title" fill="#065F46">Your Agent</text>
  <text x="94" y="652" class="copy">
    <tspan x="94" dy="0">Calls retrieve_memory</tspan>
    <tspan x="94" dy="24">through MCP</tspan>
  </text>

  <rect x="370" y="590" width="320" height="100" rx="22" fill="#ECFDF5" stroke="#6EE7B7"/>
  <text x="394" y="624" class="box-title" fill="#065F46">Memory Bank Server</text>
  <text x="394" y="652" class="copy">
    <tspan x="394" dy="0">Searches stored memories for</tspan>
    <tspan x="394" dy="24">the most relevant past context</tspan>
  </text>

  <rect x="750" y="560" width="280" height="160" rx="22" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="774" y="596" class="box-title">Stored Memory</text>
  <text x="774" y="624" class="copy">
    <tspan x="774" dy="0">SQLite-backed notes</tspan>
    <tspan x="774" dy="24">One database per namespace</tspan>
    <tspan x="774" dy="24">Shared by supported agents</tspan>
  </text>

  <rect x="1090" y="590" width="220" height="100" rx="22" fill="#ECFDF5" stroke="#6EE7B7"/>
  <text x="1114" y="624" class="box-title" fill="#065F46">Results</text>
  <text x="1114" y="652" class="copy">
    <tspan x="1114" dy="0">Relevant memory notes</tspan>
    <tspan x="1114" dy="24">returned to the agent</tspan>
  </text>

  <path d="M310 640 L370 640" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M690 640 L750 640" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1030 640 L1090 640" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>

  <rect x="450" y="705" width="180" height="42" rx="16" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="480" y="732" class="small">MCP: /mcp</text>

  <rect x="40" y="736" width="1320" height="24" rx="12" fill="#F8FAFC" stroke="#CBD5E1"/>
  <text x="60" y="753" class="small">Supported today: Claude Code, Gemini CLI, OpenCode, and OpenClaw. The server can use Anthropic, Gemini, OpenAI, or Ollama internally.</text>
</svg>
